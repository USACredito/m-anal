<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call Analysis — CEO Dashboard</title>
  <meta name="description" content="Dashboard de rendimiento de ventas para Setters y Closers. KPIs en tiempo real desde NocoDB." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">📞</div>
    <div>
      <div class="brand-name">CallAnalysis</div>
      <div class="brand-sub">CEO Dashboard</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-item active" data-tab="metricas" onclick="switchTab('metricas', this)">
      <span class="nav-icon">📊</span>
      <span>Rendimiento</span>
    </button>
    <button class="nav-item" data-tab="llamadas" onclick="switchTab('llamadas', this)">
      <span class="nav-icon">📋</span>
      <span>Llamadas</span>
    </button>
  </nav>

  <div class="sidebar-footer">
    <div class="status-dot" id="conexionDot"></div>
    <span id="conexionLabel">Verificando...</span>
  </div>
</aside>

<!-- MAIN -->
<main class="main">

  <!-- HEADER -->
  <header class="topbar">
    <div>
      <h1 class="page-title" id="pageTitle">Rendimiento del Equipo</h1>
      <p class="page-sub" id="pageSub">Semáforo de calidad · Actualizado hoy</p>
    </div>
    <div class="topbar-right">
      <div class="demo-badge" id="demoBadge" style="display:none">🧪 Modo Demo</div>
      <button class="btn-refresh" onclick="refreshData()" title="Actualizar datos">↻</button>
    </div>
  </header>

  <!-- ═══════════════════ TAB: MÉTRICAS ═══════════════════ -->
  <section class="tab-content active" id="tab-metricas">

    <!-- KPI CARDS -->
    <div class="kpi-grid" id="kpiGrid">
      <div class="kpi-card loading-pulse">
        <div class="kpi-icon">🎯</div>
        <div class="kpi-val" id="kpiExcelente">—</div>
        <div class="kpi-label">Rendimiento Top</div>
      </div>
      <div class="kpi-card loading-pulse">
        <div class="kpi-icon">⚡</div>
        <div class="kpi-val" id="kpiRegular">—</div>
        <div class="kpi-label">En Seguimiento</div>
      </div>
      <div class="kpi-card loading-pulse">
        <div class="kpi-icon">⚠️</div>
        <div class="kpi-val" id="kpiCritico">—</div>
        <div class="kpi-label">Bajo Promedio</div>
      </div>
      <div class="kpi-card loading-pulse">
        <div class="kpi-icon">📞</div>
        <div class="kpi-val" id="kpiTotalLlamadas">—</div>
        <div class="kpi-label">Llamadas Analizadas</div>
      </div>
    </div>

    <!-- FILTRO POR TIPO -->
    <div class="filter-row">
      <button class="filter-btn active" data-filter="todos" onclick="filtrarAgentes('todos', this)">Todos</button>
      <button class="filter-btn" data-filter="setter" onclick="filtrarAgentes('setter', this)">Setters (Agendamiento)</button>
      <button class="filter-btn" data-filter="closer" onclick="filtrarAgentes('closer', this)">Closers (Cierre)</button>
    </div>

    <!-- GRID DE AGENTES CON SEMÁFORO -->
    <div class="agents-grid" id="agentsGrid">
      <!-- Generado por JS -->
    </div>

  </section>

  <!-- ═══════════════════ TAB: LLAMADAS ═══════════════════ -->
  <section class="tab-content" id="tab-llamadas">

    <!-- Filtros llamadas -->
    <div class="filter-row" style="margin-bottom:20px">
      <button class="filter-btn active" data-filter="todos" onclick="filtrarLlamadas('todos', this)">Todas</button>
      <button class="filter-btn" data-filter="setter" onclick="filtrarLlamadas('setter', this)">Setters</button>
      <button class="filter-btn" data-filter="closer" onclick="filtrarLlamadas('closer', this)">Closers</button>
    </div>

    <!-- Lista de llamadas -->
    <div id="llamadasContainer">
      <p style="color:var(--text-muted);text-align:center;padding:48px">Cargando llamadas...</p>
    </div>

  </section>

</main>

<!-- ═══════════════════ MODAL DETALLE AGENTE ═══════════════════ -->
<div class="modal-overlay" id="detalleOverlay" onclick="cerrarDetalle(event)">
  <div class="modal modal-wide" id="detalleModal" style="background:var(--bg-base); backdrop-filter:blur(20px);">
    <div class="modal-header">
      <h3 id="detalleNombre">—</h3>
      <button class="modal-close" onclick="cerrarDetalle()">✕</button>
    </div>
    <div id="detalleContent" style="padding:32px;"><!-- JS --></div>
  </div>
</div>

<!-- ═══════════════════ MODAL DETALLE LLAMADA ═══════════════════ -->
<div class="modal-overlay" id="llamadaOverlay" onclick="cerrarLlamada(event)">
  <div class="modal modal-wide" id="llamadaModal">
    <div class="modal-header">
      <h3 id="llamadaTitulo">—</h3>
      <button class="modal-close" onclick="cerrarLlamada()">✕</button>
    </div>
    <div id="llamadaContent" style="padding:32px;"><!-- JS --></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
